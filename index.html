<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Microscopy Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>KV 1 SV Nagar Visakhapatnam Microscopy project - Biology Lab</h1>
        </header>

        <main id="gallery">
            <!-- Images will be dynamically loaded here -->
        </main>

        <div id="gallery-dialog" class="dialog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
            <div class="dialog-panel">
                <button id="dialog-close" class="dialog-close" aria-label="Close gallery dialog">×</button>
                <h2 id="dialog-title">Group details</h2>
                <div id="dialog-images" class="dialog-images"></div>
            </div>
        </div>

        <footer>
            <div class="students-section">
                <h2>Performed by :</h2>
                <div id="students-list">
                    <!-- Student names will be dynamically loaded here -->
                </div>
            </div>

            <div class="teachers-section">
                <h2>Guided by :</h2>
                <div id="teachers-list">
                    <!-- Teacher names will be dynamically loaded here -->
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
